<!-- Modern Exception Dialog -->
<div class="dialog-container">
  <!-- Dialog Header -->
  <div class="dialog-header">
    <div class="header-icon error">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="15" y1="9" x2="9" y2="15"></line>
        <line x1="9" y1="9" x2="15" y2="15"></line>
      </svg>
    </div>
    <h2 class="dialog-title">{{ data.title || 'Error Occurred' }}</h2>
  </div>

  <!-- Dialog Content -->
  <div class="dialog-content">
    <p class="dialog-message">{{ data.message }}</p>
    
    <!-- Exception Details -->
    <div *ngIf="hasDetails" class="exception-details">
      <div class="details-header" (click)="toggleDetails()">
        <span class="details-label">Technical Details</span>
        <div class="details-controls">
          <button class="copy-btn" (click)="onCopyDetails(); $event.stopPropagation()" title="Copy to clipboard">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
          </button>
          <button class="toggle-btn" [class.expanded]="showDetails" title="Toggle details">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="6,9 12,15 18,9"></polyline>
            </svg>
          </button>
        </div>
      </div>
      <div class="details-content" [class.expanded]="showDetails">
        <pre *ngIf="data.exception" class="exception-text">{{ data.exception }}</pre>
        <pre *ngIf="data.details" class="details-text">{{ data.details }}</pre>
      </div>
    </div>
  </div>

  <!-- Dialog Actions -->
  <div class="dialog-actions">
    <button class="btn btn-close" (click)="onClose()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
      <span>Close</span>
    </button>
  </div>
</div>
