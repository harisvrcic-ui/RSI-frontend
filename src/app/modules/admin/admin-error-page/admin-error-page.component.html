<!-- Admin Error Page – isti layout kao ostale admin stranice -->
<div class="admin-page">
  <!-- Page Header -->
  <div class="page-header">
    <div class="header-content">
      <div class="header-left">
        <h1 class="page-title">Page Not Found</h1>
        <p class="page-subtitle">The page you're looking for doesn't exist or has been moved.</p>
      </div>
    </div>
  </div>

  <!-- Error content card (kao table-container na ostalim stranicama) -->
  <div class="error-content-card">
    <div class="error-icon-wrap">
      <svg class="error-icon" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="15" y1="9" x2="9" y2="15"></line>
        <line x1="9" y1="9" x2="15" y2="15"></line>
      </svg>
    </div>
    <p class="error-message">This route is not available in the admin panel. Use the menu to navigate to a valid section.</p>
    <div class="error-actions">
      <button type="button" class="btn-primary" (click)="goToDashboard()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9,22 9,12 15,12 15,22"></polyline>
        </svg>
        <span>Go to Dashboard</span>
      </button>
      <button type="button" class="btn-secondary" (click)="goBack()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15,18 9,12 15,6"></polyline>
          <line x1="9" y1="12" x2="21" y2="12"></line>
        </svg>
        <span>Go Back</span>
      </button>
    </div>
  </div>
</div>
