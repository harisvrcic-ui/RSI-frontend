<div class="settings-page">
  <h1 class="settings-title">Settings</h1>
  <p class="settings-subtitle">{{ 'NAVIGATION.LANGUAGE' | translate }}</p>
  <div class="settings-section">
    <button type="button" class="lang-btn" (click)="setLanguage('en')">English</button>
    <button type="button" class="lang-btn" (click)="setLanguage('bs')">Bosanski</button>
    <button type="button" class="lang-btn" (click)="setLanguage('sp')">Español</button>
  </div>
</div>
