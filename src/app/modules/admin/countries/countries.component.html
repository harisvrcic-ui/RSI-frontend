<div class="admin-page">
  <!-- Page Header -->
  <div class="page-header">
    <div class="header-content">
      <div class="header-left">
        <h1 class="page-title">Countries Management</h1>
        <h1 class="page-subtitle"> Manage and view all brands in the system</h1>
      </div>
      <div class="header-actions">
        <button class="refresh-btn" (click)="refreshCountries()" [disabled]="isLoading">Refresh</button>
        <button class="add-btn" (click)="addCountry()">Add Country</button>
      </div>
    </div>
  </div>

  <!-- Search -->
  <div class="search-section">
    <div class="search-container">
      <input type="text" class="search-input" placeholder="Search countries..." (input)="applyFilter($event)" [value]="searchQuery">
    </div>
    <div class="stats-container">
      <div class="stat-item">
        <span class="stat-label">Total Countries</span>
        <span class="stat-value">{{ totalCount }}</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Page</span>
        <span class="stat-value">{{ currentPage }} of {{ totalPages }}</span>
      </div>
    </div>
  </div>

  <!-- Loading -->
  <div *ngIf="isLoading" class="loading-container">
    <div class="loading-spinner"></div>
    <p class="loading-text">Loading...</p>
  </div>

  <!-- Table -->
  <div *ngIf="!isLoading && countries.length > 0" class="table-container">
    <div class="table-wrapper">
      <table class="data-table">
        <thead class="table-header">
        <tr>
          <th class="table-header-cell">Name</th>
          <th class="table-header-cell">Status</th>
          <th class="table-header-cell actions-header">Actions</th>
        </tr>
        </thead>
        <tbody class="table-body">
        <tr *ngFor="let country of countries" class="table-row">
          <td class="table-cell">{{ country.name }}</td>
          <td class="table-cell">
              <span [class.active]="country.isActive" [class.inactive]="!country.isActive">
                {{ country.isActive ? 'Active' : 'Inactive' }}
              </span>
          </td>
          <td class="table-cell actions-cell">
            <button class="action-btn edit-btn" (click)="editCountry(country)">Edit</button>
            <button class="action-btn delete-btn" (click)="deleteCountry(country.id)">Delete</button>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Empty -->
  <div *ngIf="!isLoading && countries.length === 0" class="empty-state">
    <p>No countries found.</p>
  </div>

  <!-- Pagination -->
  <div *ngIf="totalCount > pageSize" class="pagination-container">
    <div class="pagination-controls">
      <button class="page-btn" (click)="onPageChange(currentPage - 1)" [disabled]="currentPage === 1">Prev</button>
      <button *ngFor="let p of pageNumbers" class="page-number-btn" [class.active]="p === currentPage" (click)="onPageChange(p)">
        {{ p }}
      </button>
      <button class="page-btn" (click)="onPageChange(currentPage + 1)" [disabled]="currentPage === totalPages">Next</button>
    </div>
    <div class="page-size-selector">
      <label>Rows per page:</label>
      <select [value]="pageSize" (change)="onPageSizeChange($any($event.target).value)">
        <option *ngFor="let size of [5,10,20,50]" [value]="size">{{ size }}</option>
      </select>
    </div>
  </div>
</div>
