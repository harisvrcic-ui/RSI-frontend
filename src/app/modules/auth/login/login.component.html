<div class="login-layout">
  <!-- LEFT BRAND PANEL -->
  <div class="login-brand">
    <div class="brand-inner">
      <h1>eParking</h1>
      <p>{{ 'LOGIN.WELCOME_BACK' | translate }}</p>
    </div>
  </div>

  <!-- RIGHT FORM PANEL -->
  <div class="login-form-wrapper">
    <div class="login-box">
      <h2 class="login-title">{{ 'LOGIN.TITLE' | translate }}</h2>
      <p class="login-subtitle">
        {{ 'LOGIN.USERNAME_LABEL' | translate }} & {{ 'LOGIN.PASSWORD_LABEL' | translate }}
      </p>

      <form (ngSubmit)="onLogin()" [formGroup]="form">
        <!-- USERNAME -->
        <div class="form-group">
          <label>{{ 'LOGIN.USERNAME_LABEL' | translate }}</label>
          <input
            type="text"
            formControlName="username"
            [placeholder]="'LOGIN.USERNAME_PLACEHOLDER' | translate"
            [class.error]="form.get('username')?.invalid && form.get('username')?.touched"
          />
        </div>

        <!-- PASSWORD -->
        <div class="form-group">
          <label>{{ 'LOGIN.PASSWORD_LABEL' | translate }}</label>
          <input
            type="password"
            formControlName="password"
            [placeholder]="'LOGIN.PASSWORD_PLACEHOLDER' | translate"
            [class.error]="form.get('password')?.invalid && form.get('password')?.touched"
          />
        </div>

        <button type="submit" class="login-btn" [disabled]="form.invalid">
          {{ 'LOGIN.BUTTON' | translate }}
        </button>
      </form>

      <div class="login-footer">
        <span>{{ 'LOGIN.NO_ACCOUNT' | translate }}</span>
        <a href="#">{{ 'LOGIN.SIGN_UP' | translate }}</a>
      </div>
    </div>
  </div>
</div>
